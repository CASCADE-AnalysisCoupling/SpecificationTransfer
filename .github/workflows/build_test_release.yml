name: Build, CodeQL and Release

on:
  push:
    tags:
      - "v*"


jobs:
  build:
    name: Build Maven Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Build and Verify
        run: mvn -f edu.kit.kastel.sdq.coupling.completion.specificationtransfer/pom.xml clean verify package

      - name: Archive jars
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: edu.kit.kastel.sdq.coupling.completion.specificationtransfer/target/*.jar
          if-no-files-found: error

      - name: Create source archive
        run: |
          mkdir -p release-assets
          git archive --format=tar.gz --output=release-assets/source-${{ github.ref_name }}.tar.gz HEAD

      - name: Archive source
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: release-assets/source-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  codeql:
    name: CodeQL Java Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: autobuild

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build project for CodeQL
        run: mvn -f edu.kit.kastel.sdq.coupling.completion.specificationtransfer/pom.xml clean verify package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

      - name: Fail if CodeQL alerts exist for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.sha;

            const alerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              {
                owner,
                repo,
                ref,
                tool_name: 'CodeQL',
                state: 'open'
              }
            );

            core.info(`Open CodeQL alerts for ${ref}: ${alerts.length}`);
            if (alerts.length > 0) {
              core.setFailed(`CodeQL reported ${alerts.length} open alert(s). Release is blocked.`);
            }

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: codeql
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download jar artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: release-assets

      - name: Download source archive
        uses: actions/download-artifact@v4
        with:
          name: release-source
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.jar
            release-assets/source-*.tar.gz
